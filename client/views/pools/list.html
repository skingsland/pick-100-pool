<div data-ng-init="findPools()" class="poolsList">
  <h3>March Madness Pools</h3>

  <div class="poolJumpTo" ng-show="pools.length > 1">
    <span class="jump-to-label">Jump to:</span>
    <span data-ng-repeat="pool in pools">
      <a href="" ng-click="scrollToPool(pool.$id)" ng-class="{'font-bold': isUserPool(pool)}">{{pool.name}}</a><span class="sep" ng-if="!$last">|</span>
    </span>
  </div>
  <a class="btn btn-primary" ng-href="#/pools/create" ng-show="isLoggedIn" style="margin-bottom: 25px">Create a Pool</a>

    <div data-ng-repeat="pool in pools" id="pool-{{ pool.$id }}">
      <h4>
        <a href="#/pools/{{ pool.$id }}">{{pool.name}}</a>
        <span ng-show="isLoggedIn && currentUserId === pool.managerId">
          (<a href="#/pools/{{ pool.$id }}/edit">Edit</a>)
          (<a href="" data-ng-click="removePool(pool.$id)" >Delete</a>)
        </span>
      </h4>
      <div ng-if="pool.brackets">
        <div ng-init="poolId = pool.$id; displayShowOwner=false; enableBracketNameLink=true" ng-include="'views/brackets/list.html'"></div>
      </div>
      <br/>
    </div>
</div>
